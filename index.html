<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Management System</title>
<style>
body { font-family: Arial; text-align: center; background: #f2f2f2; margin: 0; }
.header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 20px; }
.logo { width: 110px; height: 110px; border-radius: 50%; background: white; padding: 5px; object-fit: cover; }
h1 { margin: 5px; }
.container { display: flex; justify-content: center; gap: 20px; margin: 20px; flex-wrap: wrap; }
.box { background: white; padding: 20px; width: 320px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
.box h2 { background: #1e3c72; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
input, select { width: 90%; padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
button { width: 95%; padding: 10px; background: green; color: white; border: none; cursor: pointer; border-radius: 5px; font-size: 15px; margin-top: 5px; }
button:hover { background: darkgreen; }
.btn-delete { background: red; width: auto; padding: 5px 12px; font-size: 13px; }
.btn-delete:hover { background: darkred; }
.balance-box { background: #eaf4ff; border-radius: 8px; padding: 12px; margin: 8px 0; font-size: 18px; font-weight: bold; color: #1e3c72; border: 2px solid #1e3c72; }
table { width: 95%; margin: auto; background: white; border-collapse: collapse; margin-bottom: 30px; }
th, td { padding: 8px; border: 1px solid #ccc; font-size: 14px; }
th { background: #2c3e50; color: white; }
#toast { position: fixed; bottom: 30px; right: 30px; color: white; padding: 12px 22px; border-radius: 10px; font-weight: bold; display: none; z-index: 9999; }
</style>
</head>
<body>

<div class="header">
    <img class="logo" src="SVCE LOGO.jpg ">
    <h1>S.V. College of Engineering</h1>
    <h2>Hostel Management System</h2>
</div>

<div class="container">

<!-- ADD STUDENT -->
<div class="box">
    <h2>🎓 Add Student</h2>
    <input type="text" id="studentName" placeholder="Student Name">
    <input type="text" id="roomNo" placeholder="Room No">
    <input type="text" id="contactNo" placeholder="Contact No">
    <input type="text" id="parentNo" placeholder="Parent No">
    <input type="text" id="aadhaarNo" placeholder="Aadhaar No">
    <select id="aadhaarStatus">
        <option value="Not Collected">Aadhaar Collected?</option>
        <option value="Collected">Collected</option>
        <option value="Not Collected">Not Collected</option>
    </select>
    <button onclick="addStudent()">✅ Add Student</button>
</div>

<!-- FEE MODULE -->
<div class="box">
    <h2>💰 Fee Module</h2>
    <input type="text"   id="feeStudentId" placeholder="Student ID">
    <input type="number" id="totalFee"     placeholder="Total Fee"    oninput="calcBalance()">
    <input type="number" id="paidFee"      placeholder="Paid Amount"  oninput="calcBalance()">
    <div class="balance-box">
        💳 Balance: ₹<span id="balanceShow">0</span>
    </div>
    <button onclick="updateFee()">💾 Update Fee</button>
</div>

</div>

<!-- TABLE -->
<h2>📋 Student Records</h2>
<table id="studentTable">
<tr>
    <th>#</th><th>ID</th><th>Name</th><th>Room</th><th>Contact</th>
    <th>Parent</th><th>Aadhaar</th><th>Aadhaar Status</th>
    <th>Total Fee</th><th>Paid</th><th>Balance</th>
    <th>Status</th><th>Delete</th>
</tr>
</table>

<div id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwpMJ0WBWjiBN7Zx-TKupdbfHqDZM-O4J0B6lVHclkszXtgqWQg7vDtGfIBljWou3b2/exec';
let students = [];

window.onload = function() { loadStudents(); };

// ── BALANCE AUTO CALC ─────────────────
function calcBalance() {
    const total = parseFloat(document.getElementById('totalFee').value) || 0;
    const paid  = parseFloat(document.getElementById('paidFee').value)  || 0;
    document.getElementById('balanceShow').textContent = total - paid;
}

// ── LOAD ──────────────────────────────
async function loadStudents() {
    try {
        const res = await fetch(API);
        students = await res.json();
        display();
    } catch(e) { showToast('❌ Load failed!', 'red'); }
}

// ── ADD STUDENT ───────────────────────
async function addStudent() {
    const name = document.getElementById("studentName").value;
    if (!name) { showToast('⚠ Name கொடு!', 'orange'); return; }
    const data = {
        action:        'save',
        name:          name,
        room:          document.getElementById("roomNo").value,
        contact:       document.getElementById("contactNo").value,
        parent:        document.getElementById("parentNo").value,
        aadhaar:       document.getElementById("aadhaarNo").value,
        aadhaarStatus: document.getElementById("aadhaarStatus").value,
        totalFee: 0, paid: 0, balance: 0, status: 'PENDING'
    };
    showToast('⏳ Saving...', 'blue');
    try {
        await fetch(API, { method: 'POST', body: JSON.stringify(data) });
        showToast('✅ Student Added!', 'green');
        clearStudentForm();
        loadStudents();
    } catch(e) { showToast('❌ Save failed!', 'red'); }
}

// ── UPDATE FEE ────────────────────────
async function updateFee() {
    const id    = document.getElementById('feeStudentId').value.trim();
    const total = Number(document.getElementById('totalFee').value) || 0;
    const paid  = Number(document.getElementById('paidFee').value)  || 0;

    if (!id)    { showToast('⚠ Student ID கொடு!', 'orange'); return; }
    if (!total) { showToast('⚠ Total Fee கொடு!', 'orange');  return; }

    const balance = total - paid;
    const data = {
        action:   'updateFee',
        id:       id,
        totalFee: total,
        paid:     paid,
        balance:  balance,
        status:   balance <= 0 ? 'PAID' : 'PENDING'
    };
    showToast('⏳ Updating...', 'blue');
    try {
        await fetch(API, { method: 'POST', body: JSON.stringify(data) });
        showToast('✅ Fee Updated!', 'green');
        document.getElementById('feeStudentId').value = '';
        document.getElementById('totalFee').value     = '';
        document.getElementById('paidFee').value      = '';
        document.getElementById('balanceShow').textContent = '0';
        loadStudents();
    } catch(e) { showToast('❌ Update failed!', 'red'); }
}

// ── DELETE ────────────────────────────
async function deleteStudent(id) {
    if (!confirm('Delete பண்ணணுமா?')) return;
    try {
        await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
        showToast('🗑 Deleted!', 'green');
        loadStudents();
    } catch(e) { showToast('❌ Delete failed!', 'red'); }
}

// ── DISPLAY TABLE ─────────────────────
function display() {
    const table = document.getElementById("studentTable");
    table.innerHTML = `<tr>
        <th>#</th><th>ID</th><th>Name</th><th>Room</th><th>Contact</th>
        <th>Parent</th><th>Aadhaar</th><th>Aadhaar Status</th>
        <th>Total Fee</th><th>Paid</th><th>Balance</th>
        <th>Status</th><th>Delete</th>
    </tr>`;
    if (students.length === 0) {
        table.innerHTML += `<tr><td colspan="13">No students yet!</td></tr>`;
        return;
    }
    students.forEach((s, i) => {
        const color = s.Status === 'PAID' ? 'green' : 'red';
        table.innerHTML += `<tr>
            <td>${i+1}</td>
            <td>${s.ID||'-'}</td>
            <td>${s.Name||'-'}</td>
            <td>${s.Room||'-'}</td>
            <td>${s.Contact||'-'}</td>
            <td>${s.Parent||'-'}</td>
            <td>${s.Aadhaar||'-'}</td>
            <td>${s.AadhaarStatus||'-'}</td>
            <td>₹${s.TotalFee||0}</td>
            <td>₹${s.Paid||0}</td>
            <td>₹${s.Balance||0}</td>
            <td style="color:${color};font-weight:bold;">${s.Status||'-'}</td>
            <td><button class="btn-delete" onclick="deleteStudent('${s.ID}')">🗑</button></td>
        </tr>`;
    });
}

// ── CLEAR ─────────────────────────────
function clearStudentForm() {
    ['studentName','roomNo','contactNo','parentNo','aadhaarNo']
    .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('aadhaarStatus').value = 'Not Collected';
}

// ── TOAST ─────────────────────────────
function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
