<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Management System</title>

<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;margin:0;}

.header{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;padding:20px;
}

.logo{
  width:110px;height:110px;border-radius:50%;
  background:white;padding:5px;object-fit:cover;
}

.container{
  display:flex;justify-content:center;gap:20px;
  flex-wrap:wrap;margin:20px;
}

.box{
  background:white;padding:20px;width:350px;
  border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
  width:90%;padding:8px;margin:5px;
  border:1px solid #ccc;border-radius:5px;
}

button{
  width:95%;padding:10px;background:green;
  color:white;border:none;cursor:pointer;
  border-radius:5px;margin-top:5px;
}

table{
  width:98%;margin:auto;background:white;
  border-collapse:collapse;margin-bottom:30px;
}

th,td{
  border:1px solid #ccc;padding:8px;text-align:center;
}

th{background:#1e3c72;color:white;}

#toast{
  position:fixed;bottom:20px;right:20px;
  background:#333;color:white;padding:10px;
  display:none;border-radius:8px;
}

.balance-box{
  margin-top:10px;font-size:16px;
  font-weight:bold;color:#1e3c72;
}

.btn-del{
  background:red;color:white;border:none;
  padding:5px 10px;border-radius:4px;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="SVCE LOGO.jpg">
  <h1>Hostel Management System</h1>
</div>

<div class="container">

<!-- ADD STUDENT -->
<div class="box">
<h3>Add Student</h3>

<input id="studentId" placeholder="Student ID">
<input id="studentName" placeholder="Name">
<input id="roomNo" placeholder="Room No">
<input id="contactNo" placeholder="Contact No">
<input id="parentNo" placeholder="Parent No">

<input id="aadhaarNo" placeholder="Aadhaar No">

<select id="aadhaarStatus">
  <option value="Collected">Collected</option>
  <option value="Not Collected">Not Collected</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paidFee" placeholder="Paid Fee">

<button onclick="addStudent()">Add Student</button>
</div>

<!-- CHECK / UPDATE -->
<div class="box">
<h3>Check / Update Fee</h3>

<input id="checkId" placeholder="Enter Student ID" onkeyup="showBalance()">

<div class="balance-box" id="balanceBox">
Balance: ₹0
</div>

<input id="newBalance" placeholder="Enter New Paid Amount">
<button onclick="updateBalance()">Update Fee</button>

</div>

</div>

<h2>Student Records</h2>
<table id="table"></table>

<div id="toast"></div>

<script>

const API = "YOUR_GOOGLE_SCRIPT_URL_HERE";

let students = [];

window.onload = loadStudents;

// LOAD
function loadStudents(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    students = data;
    render();
  });
}

// ADD STUDENT
function addStudent(){

  let data = {
    action:"save",
    id:studentId.value,
    name:studentName.value,
    room:roomNo.value,
    contact:contactNo.value,
    parent:parentNo.value,

    aadhaar:aadhaarNo.value,
    aadhaarStatus:aadhaarStatus.value,

    totalFee:Number(totalFee.value)||0,
    paid:Number(paidFee.value)||0,
    balance:(Number(totalFee.value)||0)-(Number(paidFee.value)||0),
    status:"PENDING"
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  show("Student Added");
  setTimeout(loadStudents,1000);
}

// SHOW BALANCE
function showBalance(){

  let id = checkId.value;

  let s = students.find(x=>String(x.id)==String(id));

  if(s){
    balanceBox.innerHTML =
    `Name: ${s.name}<br>
     Total: ₹${s.totalFee}<br>
     Paid: ₹${s.paid}<br>
     Balance: ₹${s.balance}`;
  }else{
    balanceBox.innerHTML="Student Not Found";
  }
}

// UPDATE FEE
function updateBalance(){

  let id = checkId.value;
  let pay = Number(newBalance.value)||0;

  let s = students.find(x=>String(x.id)==String(id));

  if(!s){ show("Student Not found"); return; }

  let totalPaid = (Number(s.paid)||0) + pay;
  let balance = (Number(s.totalFee)||0) - totalPaid;

  let data = {
    action:"updateFee",
    id:id,
    totalFee:Number(s.totalFee),
    paid:totalPaid,
    balance:balance,
    status: balance<=0 ? "PAID":"PENDING"
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  show("Fee Updated");
  setTimeout(loadStudents,1000);
}

// DELETE
function deleteStudent(id){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"delete",id:id})
  });

  show("Deleted");
  setTimeout(loadStudents,1000);
}

// TABLE
function render(){

  let t=document.getElementById("table");

  t.innerHTML=`
<tr>
<th>ID</th><th>Name</th><th>Room</th>
<th>Contact</th><th>Parent</th>
<th>Aadhaar</th><th>Status</th>
<th>Total</th><th>Paid</th><th>Balance</th>
<th>Action</th>
</tr>`;

  students.forEach(s=>{

    t.innerHTML+=`
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.room}</td>
<td>${s.contact}</td>
<td>${s.parent}</td>
<td>${s.aadhaar}</td>
<td>${s.aadhaarStatus}</td>
<td>${s.totalFee}</td>
<td>${s.paid}</td>
<td>${s.balance}</td>
<td><button class="btn-del" onclick="deleteStudent('${s.id}')">Delete</button></td>
</tr>`;
  });
}

// TOAST
function show(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

</script>

</body>
</html>
